[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Scheduled function - refresh data every hour
[functions."scheduled-refresh"]
  schedule = "@hourly"

# Redirect /api/* to Netlify Functions
[[redirects]]
  from = "/api/properties"
  to = "/.netlify/functions/fetch-properties"
  status = 200
  force = true

[[redirects]]
  from = "/api/rates"
  to = "/.netlify/functions/fetch-rates"
  status = 200

[[redirects]]
  from = "/api/img"
  to = "/.netlify/functions/img-proxy"
  status = 200

[[redirects]]
  from = "/api/refresh"
  to = "/.netlify/functions/scheduled-refresh"
  status = 200

# Custom 404 page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ============================================================
# GLOBAL SECURITY HEADERS — all pages (A+ on securityheaders.com)
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "SAMEORIGIN"
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Force HTTPS (1 year, include subdomains, preload-ready)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Control referrer info sent to other sites
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Disable unnecessary browser APIs
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
    # Legacy XSS protection (for older browsers)
    X-XSS-Protection = "1; mode=block"
    # Content Security Policy — allow our domains + CDNs we use
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://*.sdn.cz https://*.sreality.cz https://*.bezrealitky.cz https://*.bezrealitky.com https://images.unsplash.com https://*.tile.openstreetmap.org blob:; connect-src 'self' https://bydlimtu.netlify.app https://*.tile.openstreetmap.org https://fonts.googleapis.com https://fonts.gstatic.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"
    # Cross-Origin policies
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

# ============================================================
# CACHE CONTROL per resource type
# ============================================================
[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "public, max-age=1800, stale-while-revalidate=3600"
    Access-Control-Allow-Origin = "*"

# Static assets — long cache
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
