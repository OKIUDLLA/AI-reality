<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stránka nenalezena — BydlímTu Reality</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text x='0' y='28' font-size='32'>🏠</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f9fafb;color:#1f2937;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.container{text-align:center;max-width:500px}
.icon{font-size:6rem;margin-bottom:24px;opacity:.7}
h1{font-size:2rem;font-weight:800;color:#1a56db;margin-bottom:12px}
p{font-size:1.1rem;color:#6b7280;margin-bottom:28px;line-height:1.6}
.btn{display:inline-flex;align-items:center;gap:8px;background:#1a56db;color:#fff;padding:14px 28px;border-radius:8px;font-size:1rem;font-weight:600;text-decoration:none;transition:all .2s}
.btn:hover{background:#1244b0;transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,86,219,.3)}
.links{margin-top:20px;font-size:.9rem;color:#9ca3af}
.links a{color:#1a56db;text-decoration:none;margin:0 8px}
.links a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="container">
<div class="icon">🏠</div>
<h1>Stránka nenalezena</h1>
<p>Tato adresa neexistuje. Možná jste se překlikli nebo byl odkaz odstraněn.</p>
<a href="/" class="btn">Zpět na hlavní stránku</a>
<div class="links">
